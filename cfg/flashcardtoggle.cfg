// toggle crosshair
// change this when changing the crosshair
// left = personal crosshair
// right = grenade crosshair
// grenade crosshair code: CSGO-SM3kP-Vmtsi-fFtU4-6MGLJ-KuwTC
// toggle cl_crosshairstyle "4" "4"
// toggle cl_crosshaircolor "5" "5"
toggle cl_crosshairsize "1.8" "5.9"
toggle cl_crosshairgap "-0.5" "1"
// toggle cl_crosshairalpha "255" "255"
// toggle cl_crosshairusealpha "1" "1"
toggle cl_crosshairthickness "0.4" "1.1"
toggle cl_crosshaircolor_r "255" "0"
toggle cl_crosshaircolor_g "94" "190"
toggle cl_crosshaircolor_b "255" "0"
// toggle cl_crosshair_drawoutline "1" "1"
// toggle cl_crosshair_outlinethickness "1" "1"
toggle cl_crosshairdot "1" "0"
// toggle cl_crosshair_t "0" "0"
